<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>空白提示页</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #bbbbbb;
      font-family: serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      padding: 16px;
      text-align: center;
      width: fit-content;
      background: transparent;
      border-radius: 1px;
    }

    .t1 {
      font-size: 48px;
      font-style: italic;
    }

    .t2 {
      font-size: 40px;
      font-style: italic;
    }

    .t3 {
      font-size: 32px;
      font-style: italic;
    }

    .t4 {
      font-size: 24px;
      font-style: italic;
      text-shadow: 0 0 20px #f085e0;
    }

    .t5 {
      font-size: 20px;
      font-style: italic;
      text-decoration: line-through;
      margin-top: 8px;
    }

    img {
      width: 520px;
      height: auto;
      margin-top: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="t1">此处是有意留空的</div>
    <div class="t2">本范本只是用来告诉你这一点</div>
    <div class="t3">这一切都不是 幻觉！</div>
    <div class="t4">还在辶里发呆干啥？醒醒吧阿宅！</div>
    <div class="t5">这一切都不是幻觉！。</div>

    <img src="UncycloTan11.png" alt="图片" />
  </div>
</body>
</html>
