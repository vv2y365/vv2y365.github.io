<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>施工中</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      color: white;
      overflow: hidden;
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
    }

    /* 动态背景 */
    .bg {
      position: absolute;
      width: 70vw;
      height: 70vw;
      max-width: 600px;
      max-height: 600px;
      background: radial-gradient(circle, #ff2d55, transparent);
      filter: blur(120px);
      animation: move 10s infinite alternate ease-in-out;
    }

    @keyframes move {
      0% { transform: translate(-20%, -20%); }
      100% { transform: translate(20%, 20%); }
    }

    /* 卡片 */
    .card {
      position: relative;
      width: min(90vw, 380px);
      padding: 28px 22px;
      border-radius: 28px;
      backdrop-filter: blur(30px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(94, 198, 247, 0.363);
      text-align: center;
    }

    .t5 {
      font-size: 17;
      font-style: normal;
      text-shadow: 0 0 20px #ffffff;
    }

    .text {
      font-size: 20px;
      line-height: 1.7;
      color: #e5e5e7;
      margin-bottom: 28px;
      white-space: pre-line;
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff2d55, #ff6b81);
      box-shadow: 0 8px 20px rgba(255, 45, 85, 0.4);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 12px 30px rgba(255, 45, 85, 0.5);
    }

    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 10px rgba(255, 45, 85, 0.3);
    }

    /* 手机优化 */
    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
        border-radius: 24px;
      }

      .text {
        font-size: 13px;
      }

      .btn {
        font-size: 15px;
        padding: 12px 0;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="card">
    <div class="text">
还在施工中🚧
测试用
此处是有意留空的
本范本只是用来告诉你这一点
这一切都不是 幻觉！

<div class="t5">还在辶里发呆干啥？醒醒吧阿宅！</div>

    </div>

    <button
      class="btn"
      onclick="window.location.href='https://music.p14yer.nl/?music=https://inhwuxtzwwyidklodzrk.supabase.co/storage/v1/object/public/music/YOASOBI.flac&lyric=https%3A%2F%2Famlldb.bikonoo.com%2Fraw-lyrics%2F1689406537000-83578994-376644ed.ttml&cover=https%3A%2F%2Fp1.music.126.net%2F3xWlqwYmfwRFebeiONUpGg%3D%3D%2F109951164546210608.jpg&title=夜に駆ける&artist=YOASOBI'"
    >
      START
    </button>
  </div>

</body>
</html>
